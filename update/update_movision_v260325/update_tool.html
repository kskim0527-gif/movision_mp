<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movition 펌웨어 업데이트 도구 (Standalone)</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --success: #22c55e;
            --error: #ef4444;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
            color: var(--primary);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .step-card {
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            background-color: #fafafa;
        }

        .step-title {
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .step-number {
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        button {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 0.75rem;
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .hidden { display: none; }

        #log {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #1e293b;
            color: #f1f5f9;
            border-radius: 0.75rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.8rem;
            height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .progress-container {
            margin-top: 1.25rem;
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            overflow: hidden;
        }

        #progressBar {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            width: 0%;
            transition: width 0.3s;
        }

        .status-msg {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            text-align: center;
            font-weight: 500;
        }

        .file-info {
            background: #f1f5f9;
            padding: 0.5rem;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
            text-align: center;
            border: 1px dashed var(--border);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Movition Updater</h1>
        <p class="subtitle">모비전 펌웨어 전송 도구 - Version 260325 (2026-03-25)</p>

        <div id="step1" class="step-card">

            <div id="fileInfo" class="file-info">bin 파일들(5개)을 한꺼번에 선택해 주세요.</div>
            <input type="file" id="fileInput" accept=".bin" class="hidden" multiple>
            <button id="selectFileBtn">파일 선택 (5개 세트)</button>
        </div>

        <div id="step2" class="step-card">

            <button id="connectBtn" disabled>업데이트 시작</button>
            <div class="progress-container hidden" id="progressWrapper">

            <div id="status" class="status-msg">파일을 먼저 선택해 주세요.</div>
        </div>

        let targetLib = null;
        let engineReady = false;

        const logArea = document.getElementById('log');
        const statusMsg = document.getElementById('status');
        const selectFileBtn = document.getElementById('selectFileBtn');
        const connectBtn = document.getElementById('connectBtn');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const progressBar = document.getElementById('progressBar');
        const progressWrapper = document.getElementById('progressWrapper');

        const log = (msg) => {
            const time = new Date().toLocaleTimeString();
            logArea.innerText += `[${time}] ${msg}\n`;
            logArea.scrollTop = logArea.scrollHeight;
        };

        const ui8ToBstr = (ui8) => {
            let str = "";
            const chunk = 8192;
            for (let i = 0; i < ui8.length; i += chunk) {
                str += String.fromCharCode.apply(null, ui8.subarray(i, i + chunk));
            }
            return str;
        };

        const loadEngine = async () => {
            try {
                log("엔진 로딩 중...");
                const bytes = Uint8Array.from(atob(b64Data), c => c.charCodeAt(0));
                const blob = new Blob([bytes], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                const lib = await import(url);
                return lib;
            } catch (err) {
                log("엔진 로드 실패: " + err.message);
                throw err;
            }
        };

        selectFileBtn.onclick = () => fileInput.click();

        fileInput.onchange = () => {
            if (fileInput.files.length > 0) {
                statusMsg.innerText = `${fileInput.files.length}개의 파일 선택됨`;
                const fileNames = Array.from(fileInput.files).map(f => f.name).join(', ');
                fileInfo.innerText = "선택됨: " + (fileNames.length > 50 ? fileNames.substring(0, 47) + "..." : fileNames);
                if (engineReady) {
                    connectBtn.disabled = false;
                    statusMsg.innerText = "연결 준비 완료";
                }
            } else {
                statusMsg.innerText = "파일을 선택해 주세요.";
                fileInfo.innerText = "bin 파일들(5개)을 한꺼번에 선택해 주세요.";
                connectBtn.disabled = true;
            }
        };

        connectBtn.onclick = async () => {
            if (!fileInput.files.length || !engineReady) return;
            
            try {
                connectBtn.disabled = true;
                log("사용자 포트 요청 중...");
                const port = await navigator.serial.requestPort();
                
                const transport = new targetLib.Transport(port);
                const esploader = new targetLib.ESPLoader({
                    transport: transport,
                    baudrate: 460800,
                    romBaudrate: 115200,
                    terminal: {
                        clean: () => { logArea.innerText = ""; },
                        writeLine: (data) => log(data),
                        write: (data) => log(data)
                    }
                });

                statusMsg.innerText = "장치와 통신 시도 중...";
                await esploader.main();
                
                const ADDR_MAP = {
                    'bootloader.bin': 0x0,
                    'partition-table.bin': 0x8000,
                    'ota_data_initial.bin': 0xF000,
                    'movision.bin': 0x20000,
                    'storage.bin': 0x3B2000
                };

                const fileArray = [];
                const readPromises = Array.from(fileInput.files).map(file => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const address = ADDR_MAP[file.name];
                            if (address !== undefined) {
                                fileArray.push({
                                    data: ui8ToBstr(new Uint8Array(e.target.result)),
                                    address: address,
                                    name: file.name
                                });
                                log(`- 인식됨: ${file.name} -> 0x${address.toString(16)}`);
                            } else {
                                log(`- 무시됨 (알 수 없는 파일명): ${file.name}`);
                            }
                            resolve();
                        };
                        reader.readAsArrayBuffer(file);
                    });
                });

                await Promise.all(readPromises);

                if (fileArray.length === 0) {
                    log("❌ 오류: 인식 가능한 바이너리 파일이 없습니다.");
                    statusMsg.innerText = "파일 인식 실패";
                    connectBtn.disabled = false;
                    return;
                }

                fileArray.sort((a, b) => a.address - b.address);
                log(`총 ${fileArray.length}개의 파일을 전송 준비합니다.`);

                progressWrapper.classList.remove('hidden');
                statusMsg.innerText = "업데이트 진행 중...";

                try {
                    await esploader.writeFlash({
                        fileArray: fileArray,
                        flashSize: "keep",
                        flashMode: "keep",
                        flashFreq: "keep",
                        eraseAll: false,
                        compress: true,
                        reportProgress: (fileIndex, written, total) => {
                            const percent = Math.floor((written / total) * 100);
                            progressBar.style.width = percent + "%";
                            statusMsg.innerText = `전송 중... [${fileIndex + 1}/${fileArray.length}] ${percent}%`;
                        }
                    });

                    log("✅ 성공: 모든 데이터가 전송되었습니다!");
                    statusMsg.innerText = "완료! 장치가 재부팅됩니다.";
                    await esploader.after("hard_reset");
                } catch (err) {
                    log("❌ 전송 오류: " + err.message);
                    statusMsg.innerText = "전송 실패";
                }
            } catch (err) {
                log("❌ 연결 오류: " + err.message);
                statusMsg.innerText = "연결 실패";
            } finally {
                connectBtn.disabled = false;
            }
        };

        (async () => {
            try {
                targetLib = await loadEngine();
                engineReady = true;
                log("시스템 준비 완료.");
                if (fileInput.files.length > 0) {
                    connectBtn.disabled = false;
                    statusMsg.innerText = "연결 준비 완료";
                } else {
                    statusMsg.innerText = "업데이트 파일을 한꺼번에 선택해 주세요.";
                }
            } catch (e) {
                log("초기화 실패: " + e.message);
                statusMsg.innerText = "시스템 초기화 실패";
            }
        })();
